<!DOCTYPE html>
<html>
<head>
<title>YoutubeByAaron</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;

/* 🌌 fondo mejorado */
background:
radial-gradient(circle at 20% 20%, rgba(255,0,0,0.15), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(0,150,255,0.15), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(255,255,255,0.05), transparent 50%),
#000;
}

/* HEADER */
header{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 20px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,0.08);
z-index:10;
}

.logo{
font-weight:bold;
color:#ff0033;
text-shadow:0 0 10px rgba(255,0,0,0.5);
}

.search{
width:40%;
padding:10px;
border-radius:25px;
border:none;
outline:none;
background:rgba(255,255,255,0.06);
color:white;
}

/* HOME */
.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:18px;
padding:20px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card video{
width:100%;
height:140px;
object-fit:cover;
}

.info{
padding:10px;
}

/* PLAYER */
.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
}

.player video{
width:100%;
height:55%;
object-fit:cover;
}

.content{
padding:15px;
overflow:auto;
}

/* BACK */
.back{
color:#ff0033;
cursor:pointer;
font-weight:bold;
margin-bottom:10px;
}

/* BUTTONS */
button{
padding:10px 14px;
border:none;
border-radius:20px;
background:rgba(255,255,255,0.08);
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#ff0033;
}

/* COMMENTS */
input{
width:100%;
padding:10px;
border-radius:20px;
border:none;
background:rgba(255,255,255,0.06);
color:white;
outline:none;
}

.comment{
margin-top:8px;
padding:8px;
background:rgba(255,255,255,0.05);
border-radius:10px;
}

/* NAV */
nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
padding:10px;
}

nav button{
background:none;
font-size:16px;
}

</style>
</head>

<body>

<header>
<div class="logo">▶ YoutuEconomico Hd 4K ultra Remasterizado super fluido 60 FPS</div>
<input class="search" id="search" placeholder="Buscar..." onkeyup="filter()">
</header>

<!-- HOME -->
<div id="home" class="container">

<div class="card" onclick="openVideo('video.mp4.mp4','Lumiere Expedition 33')">
<video muted src="video.mp4.mp4"></video>
<div class="info">Lumiere Expedition 33</div>
</div>

<div class="card" onclick="openVideo('colapso.mp4','Colapso')">
<video muted src="colapso.mp4"></video>
<div class="info">Colapso</div>
</div>

<div class="card" onclick="openVideo('esperandote.mp4','Esperándote')">
<video muted src="esperandote.mp4"></video>
<div class="info">Esperándote</div>
</div>

<div class="card" onclick="openVideo('ccc.mp4','CCC Remix')">
<video muted src="ccc.mp4"></video>
<div class="info">CCC Remix</div>
</div>

</div>

<!-- PLAYER -->
<div id="player" class="player">

<video id="mainVideo" controls autoplay></video>

<div class="content">

<div class="back" onclick="goHome()">⬅ Volver</div>

<h2 id="title"></h2>

<button onclick="like()">❤️ Like (<span id="likes">0</span>)</button>

<h3>Comentarios</h3>

<input id="commentInput" placeholder="Escribe...">
<button onclick="addComment()">Enviar</button>

<div id="commentList"></div>

</div>

</div>

<!-- NAV -->
<nav>
<button onclick="goHome()">🏠 Home</button>
<button onclick="alert('Buscar')">🔍 Search</button>
<button onclick="alert('Perfil')">👤 Profile</button>
</nav>

<script>

let likes=0;
let current="";

/* 🔥 ERROR CONTROL (evita pantalla en blanco) */
window.onerror = function(msg){
console.log("Error:",msg);
};

/* OPEN VIDEO */
function openVideo(src,title){

document.getElementById("home").style.display="none";
document.getElementById("player").style.display="flex";

let v=document.getElementById("mainVideo");
v.src=src;
v.play().catch(()=>{});

document.getElementById("title").innerText=title;

current=title;

/* likes */
likes=Number(localStorage.getItem("like_"+title)||0);
document.getElementById("likes").innerText=likes;

/* comments */
loadComments();
}

/* HOME */
function goHome(){
document.getElementById("player").style.display="none";
document.getElementById("home").style.display="grid";
}

/* LIKE */
function like(){
likes++;
localStorage.setItem("like_"+current,likes);
document.getElementById("likes").innerText=likes;
}

/* COMMENTS */
function addComment(){

let t=document.getElementById("commentInput");
if(!t.value) return;

let key="com_"+current;
let arr=JSON.parse(localStorage.getItem(key)||"[]");

arr.push(t.value);
localStorage.setItem(key,JSON.stringify(arr));

t.value="";
loadComments();
}

function loadComments(){

let key="com_"+current;
let arr=JSON.parse(localStorage.getItem(key)||"[]");

let box=document.getElementById("commentList");
box.innerHTML="";

arr.forEach(c=>{
let d=document.createElement("div");
d.className="comment";
d.innerText=c;
box.appendChild(d);
});
}

/* SEARCH */
function filter(){

let q=document.getElementById("search").value.toLowerCase();

document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(q)?"block":"none";
});
}

</script>

</body>
</html>
